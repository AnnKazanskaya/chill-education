<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Оплата занятий — Chat &amp; Chill</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',sans-serif;color:#1A1E33;background:#EEF0FB;-webkit-font-smoothing:antialiased;min-height:100vh}
  img{display:block}
  a{color:inherit}
  ::selection{background:#FF7A1A;color:#fff}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .h-nunito{font-family:'Nunito',sans-serif}
  .pay-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;align-items:stretch}
</style>
</head>
<body>
<div class="wrap">

  <header style="display:flex;align-items:center;justify-content:space-between;padding:14px 0">
    <a href="index.html" style="display:flex;align-items:center;text-decoration:none">
      <img src="img/logo.png" alt="Chat and Chill" style="height:56px;width:auto">
    </a>
    <a href="index.html" style="font-weight:700;font-size:15px;color:#2440D9;text-decoration:none">← На главную</a>
  </header>

  <section style="padding:24px 0 40px">
    <div style="text-align:center;max-width:640px;margin:0 auto 40px">
      <span style="font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#2440D9">Оплата</span>
      <h1 class="h-nunito" style="font-weight:900;font-size:clamp(30px,4.4vw,48px);line-height:1.02;letter-spacing:-1px;margin:12px 0 14px">Оплата занятий</h1>
      <p style="font-size:17px;line-height:1.5;color:#5A5F7D">Выбери свой пакет и перейди к безопасной оплате. После оплаты напиши нам в <a href="https://t.me/chilleducation" style="color:#2440D9;text-decoration:none;font-weight:600">Telegram</a> — сразу откроем уроки и согласуем расписание.</p>
    </div>

    <div class="pay-grid" id="pay-cards"></div>

    <p style="text-align:center;font-size:14px;color:#8C90AC;margin-top:28px">Оплата проходит на защищённой странице. Остались вопросы? Напиши в <a href="https://t.me/chilleducation" style="color:#2440D9;text-decoration:none;font-weight:600">Telegram</a>.</p>
  </section>

  <footer style="padding:30px 0 50px;border-top:1px solid #E2E5F4;margin-top:20px">
    <span style="font-size:13px;color:#B0B3C9">ИП Кувшинов А. В. · БИН 001009551336</span>
  </footer>

</div>

<script>
const OPTIONS = [
  { name: 'Разовый урок', note: '1 урок · без пакета', price: '1 500 ₽', url: 'https://chill1500.tb.ru/', popular: false },
  { name: 'Chill Basic', note: '4 урока · 1 в неделю', price: '10 000 ₽', url: 'https://chill10k.tb.ru/', popular: false },
  { name: 'Chill Plus', note: '8 уроков · 2 в неделю', price: '18 500 ₽', url: 'https://chill18500.tb.ru/', popular: true },
  { name: 'Chill Pro', note: '12 уроков · 3 в неделю', price: '24 000 ₽', url: 'https://chill24k.tb.ru/', popular: false },
];

document.getElementById('pay-cards').innerHTML = OPTIONS.map(o => {
  const pop = o.popular;
  const cardBg = pop ? 'linear-gradient(160deg,#16236B,#2D4BE6)' : '#fff';
  const title = pop ? '#fff' : '#1A1E33';
  const note = pop ? 'rgba(255,255,255,.75)' : '#8C90AC';
  const btnBg = pop ? '#FF7A1A' : '#2440D9';
  const shadow = pop ? '0 30px 60px -30px rgba(36,64,217,.6)' : '0 24px 50px -36px rgba(36,64,217,.35)';
  return `
  <div style="position:relative;display:flex;flex-direction:column;background:${cardBg};border-radius:26px;padding:28px 24px;box-shadow:${shadow}">
    ${pop ? '<span style="position:absolute;top:22px;right:22px;background:#FF7A1A;color:#fff;font-weight:800;font-size:12px;padding:5px 12px;border-radius:999px">★ Хит</span>' : ''}
    <h3 class="h-nunito" style="font-weight:800;font-size:22px;letter-spacing:-.3px;color:${title}">${o.name}</h3>
    <p style="font-size:14px;color:${note};margin:6px 0 22px">${o.note}</p>
    <div class="h-nunito" style="font-weight:900;font-size:30px;letter-spacing:-.5px;color:${title};margin-top:auto">${o.price}</div>
    <a href="${o.url}" target="_blank" rel="noopener" style="display:block;text-align:center;text-decoration:none;font-weight:700;font-size:15px;padding:14px;border-radius:14px;background:${btnBg};color:#fff;margin-top:18px">Оплатить</a>
  </div>`;
}).join('');
</script>
</body>
</html>
